name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Newer pushes to the same ref supersede in-progress runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Formatting is platform-independent — check it once, fast.
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # Lint + test on every supported platform.
  #   windows / macos = the real targets (both case-INsensitive filesystems).
  #   ubuntu          = canary: fast, and the only case-SENSITIVE runner, so it
  #                     catches casing/path bugs Win+Mac would silently pass.
  check:
    name: clippy + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # see every platform's result, not just the first failure
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
