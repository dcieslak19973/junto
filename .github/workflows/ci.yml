name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Newer pushes to the same ref supersede in-progress runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

# Cost shape (private-repo Actions minutes): linux bills 1×, windows 2×,
# macOS 10× — a full five-job matrix on every PR push burned the monthly
# quota in a day (2026-06-12). PRs therefore run the cheap linux canary
# only; the full cross-platform matrix runs where it matters: on every
# merge to main.

jobs:
  # Formatting is platform-independent — check it once, fast.
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # Every push and PR: the 1×-billed canary. Ubuntu is also the only
  # case-SENSITIVE runner, so it catches casing/path bugs Win+Mac would
  # silently pass.
  check:
    name: clippy + test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  # Merges to main only: the real target platforms (both case-INsensitive
  # filesystems), at 2× / 10× billing.
  check-platforms:
    name: clippy + test (${{ matrix.os }})
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # see every platform's result, not just the first failure
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  # The desktop shell (docs/adr/0018) is its own workspace, quarantined from
  # the kernel one because Tauri's dependency tree is enormous — so it gets
  # its own job, on the app's target platforms only (Windows + macOS; Linux
  # would need webkit2gtk system packages and isn't an app target yet).
  # Merges to main only: Tauri's tree is the most expensive thing CI builds.
  desktop:
    name: desktop shell (${{ matrix.os }})
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/junto-desktop
      - name: Format check
        run: cargo fmt --manifest-path crates/junto-desktop/Cargo.toml --check
      - name: Clippy (warnings are errors)
        run: cargo clippy --manifest-path crates/junto-desktop/Cargo.toml --all-targets -- -D warnings
