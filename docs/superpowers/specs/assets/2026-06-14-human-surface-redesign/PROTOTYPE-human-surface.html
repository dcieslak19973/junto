<!doctype html><html lang="en"><head><meta charset="utf-8">
<title>junto — PROTOTYPE (human surface)</title>
<!--
  THROWAWAY PROTOTYPE — not production. Answers: "does the redesigned human
  surface feel right to use?" (top-strip lineage · merged inquiry/session ·
  artifact viewer w/ pop-out · contextual steer · deliberate record).
  One command: open this file in a browser. State is in-memory; reload resets.
  Real surface is server-rendered Rust (crates/junto/src/render.rs); this is
  vanilla HTML/JS only to make the design clickable. Fold the verdict into the
  spec, then delete.
-->
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0d10;--panel:#13171d;--strip:#0e1217;--line:#1f2630;--ink:#e6e9ee;--dim:#7d8696;--faint:#525b69;--accent:#5b9dff;--warn:#ffb454;--ok:#5fd3a6;--violet:#b98cff;--rose:#ff7a93}
body{background:var(--bg);color:var(--ink);font:14px/1.5 Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.bar{display:flex;align-items:center;gap:14px;padding:12px 24px;border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:16px;cursor:pointer}
.glyph{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--violet));display:grid;place-items:center;color:#fff;font-weight:800;font-size:14px}
.switch{position:relative}
.switch .cur{display:flex;align-items:center;gap:9px;padding:6px 11px;border:1px solid var(--line);border-radius:9px;background:#10141a;cursor:pointer}
.switch .ri{width:20px;height:20px;border-radius:5px;background:#1b2330;display:grid;place-items:center;color:var(--accent);font-size:11px}
.switch .rn{font-size:13px;font-weight:600}.switch .car{color:var(--faint);font-size:11px}
.switch .menu{position:absolute;top:38px;left:0;background:#11161d;border:1px solid var(--line);border-radius:9px;padding:5px;min-width:200px;z-index:30;display:none;box-shadow:0 8px 24px #0008}
.switch.open .menu{display:block}
.switch .menu a{display:flex;gap:9px;padding:8px 10px;border-radius:7px;color:var(--dim);text-decoration:none;font-size:13px;cursor:pointer}
.switch .menu a:hover{background:#172030;color:var(--ink)}
.spacer{flex:1}
.live-strip{display:flex;gap:7px;align-items:center;font-size:13px;color:var(--dim)}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok);animation:p 1.6s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.35}}
.acct{display:flex;align-items:center;gap:8px;color:var(--dim);font-size:13px}
.pa{width:28px;height:28px;border-radius:7px;background:#2a3340;display:grid;place-items:center;font-weight:700;color:var(--dim);font-size:12px}
/* strip */
.strip{background:var(--strip);border-bottom:1px solid var(--line);padding:4px 0 0}
.strip-head{display:flex;align-items:center;padding:7px 24px 0}
.strip-head .t{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--faint)}
.strip-head .h{margin-left:auto;font-size:11px;color:var(--faint)}
svg{width:100%;height:auto;display:block}
.lname{font:600 11px Inter;fill:var(--dim);cursor:pointer}.lname.sel{fill:var(--warn)}
.track-hit{cursor:pointer}
.axis{font:500 9px 'JetBrains Mono';fill:var(--faint)}.nowlab{font:600 9px 'JetBrains Mono';fill:var(--accent)}
.capglow{animation:p 1.8s infinite}
/* detail */
.blade{padding:16px 26px 60px}
.bh{display:flex;align-items:center;gap:12px;margin:2px 0 4px;flex-wrap:wrap}.bh h1{font-size:22px;font-weight:600;letter-spacing:-.01em}
.chip{font:500 11px 'JetBrains Mono';padding:3px 10px;border-radius:11px}
.chip.live{color:var(--ok);background:#5fd3a61a}.chip.gate{color:var(--warn);background:#ffb4541a}.chip.conv{color:var(--ok);background:#5fd3a61a}.chip.quiet{color:var(--dim);background:#7d86961a}
.bh .acts{margin-left:auto;display:flex;gap:8px}
.gbtn{font:500 12px Inter;padding:7px 13px;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--dim);cursor:pointer}
.gbtn.rec{border-color:#3a4a6a;color:var(--accent)}.gbtn:hover{background:#172030;color:var(--ink)}
.bsub{color:var(--dim);font-size:13px;font-family:'JetBrains Mono';margin-bottom:14px}.bsub b{color:var(--violet)}
.prog{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.sbar{flex:1;height:6px;background:#1c2530;border-radius:4px;overflow:hidden}.sbar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--ok))}
.pcap{font:500 11px 'JetBrains Mono';color:var(--faint)}
.grid{display:grid;grid-template-columns:0.92fr 1.18fr;gap:18px;align-items:start}
.col-solo{max-width:760px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:16px}
.card>.ch{padding:11px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px}
.ch .h{font-weight:600;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--dim)}
.ch .badge{margin-left:auto;font:500 11px 'JetBrains Mono';padding:2px 9px;border-radius:10px;color:var(--warn);background:#ffb4541a}
.gate-row{padding:14px 16px;display:flex;gap:12px}
.av{width:26px;height:26px;border-radius:7px;flex:none;display:grid;place-items:center;font-weight:700;font-size:12px;color:#fff;background:linear-gradient(135deg,#5b9dff,#b98cff)}
.gb{flex:1}.gt{font-weight:500;font-size:14px}.gm{font-size:12px;color:var(--dim);font-family:'JetBrains Mono';margin:2px 0 8px}
.why{font-size:13px;color:var(--dim);border-left:2px solid var(--line);padding-left:10px;margin-bottom:10px}
.mini{display:flex;gap:7px}
.mb{font:500 12px Inter;padding:6px 14px;border-radius:7px;border:1px solid var(--line);background:transparent;color:var(--dim);cursor:pointer}
.mb:hover{background:#172030;color:var(--ink)}
.mb.warn{background:var(--warn);color:#1a1205;border-color:var(--warn)}.mb.warn:hover{filter:brightness(1.08);color:#1a1205}
.mb.go{background:var(--accent);color:#fff;border-color:var(--accent)}.mb.go:hover{filter:brightness(1.08);color:#fff}
.turn{padding:11px 16px;border-bottom:1px solid var(--line);display:flex;gap:12px}.turn:last-child{border-bottom:0}
.who{width:48px;flex:none;font:500 11px 'JetBrains Mono';color:var(--faint);padding-top:1px}
.tt{font-size:13.5px}.tt .new{color:var(--ok);font:500 10px 'JetBrains Mono';margin-left:6px}
.k{font-family:'JetBrains Mono';font-size:12px;background:#0c1218;border:1px solid var(--line);padding:1px 5px;border-radius:5px;color:var(--violet)}
.steer{border:1px solid #2a3850;border-radius:12px;background:#0f141b;padding:12px 14px}
.steer .lbl{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.steer textarea,.start textarea{width:100%;background:#0a0e13;border:1px solid var(--line);border-radius:9px;padding:10px 12px;color:var(--ink);font:14px Inter;resize:none}
.steer textarea::placeholder{color:var(--faint)}
.steer .send{display:flex;justify-content:flex-end;margin-top:8px}
.dec{padding:13px 16px;border-bottom:1px solid var(--line);font-size:13.5px}.dec:last-child{border-bottom:0}
.dec .when{color:var(--faint);font-size:11px;font-family:'JetBrains Mono';margin-left:6px}
.start{padding:14px 16px}
.start input{width:100%;background:#0a0e13;border:1px solid var(--line);border-radius:9px;padding:11px 13px;color:var(--ink);font:14px Inter;margin-bottom:10px}
.start input::placeholder{color:var(--faint)}
/* artifact viewer */
.viewer{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;position:sticky;top:14px}
.vhead{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--line)}
.vhead .h{font-weight:600;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--dim)}
.vhead .pop{margin-left:auto;color:var(--faint);font-size:13px;cursor:pointer;border:1px solid var(--line);border-radius:6px;padding:3px 9px}
.vhead .pop:hover{background:#172030;color:var(--ink)}
.tabs{display:flex;gap:6px;padding:10px 14px;border-bottom:1px solid var(--line);overflow:auto}
.tab{display:flex;align-items:center;gap:7px;padding:6px 11px;border-radius:8px;border:1px solid var(--line);background:#10141a;font-size:12px;color:var(--dim);white-space:nowrap;cursor:pointer}
.tab:hover{color:var(--ink)}
.tab.on{border-color:#3a4a6a;background:#16202c;color:var(--ink)}
.tab .ic{color:var(--violet)}.tab .last{font:500 10px 'JetBrains Mono';color:var(--ok)}
.diff{font-family:'JetBrains Mono';font-size:12px;line-height:1.75;background:#0a0e13;max-height:460px;overflow:auto}
.diff .dl{padding:0 16px;white-space:pre}
.diff .add{background:#0f2a1c;color:#8fe3b6}.diff .del{background:#2a1318;color:#f3a3ad}.diff .hd{color:var(--faint)}
.imgwrap{padding:14px;cursor:zoom-in}.imgwrap img{width:100%;border-radius:8px;display:block;border:1px solid var(--line)}
.vmeta{padding:9px 16px;border-top:1px solid var(--line);font:500 11px 'JetBrains Mono';color:var(--faint);display:flex;gap:14px;flex-wrap:wrap}
.empty{padding:40px 16px;text-align:center;color:var(--faint);font-size:13px}
/* focus board (home) */
.board-h{font-size:24px;font-weight:600;margin:6px 0 2px}
.board-sub{color:var(--dim);margin-bottom:22px}
.fitem{display:flex;gap:14px;align-items:flex-start;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 16px;margin-bottom:12px;cursor:pointer}
.fitem:hover{border-color:#3a4a6a}
.ftick{width:9px;height:9px;border-radius:50%;margin-top:6px;flex:none}
.fbody{flex:1}.ftitle{font-weight:500;font-size:15px}.fmeta{font-size:12px;color:var(--dim);font-family:'JetBrains Mono';margin-top:2px}
.fact{margin-left:auto;display:flex;gap:7px;align-self:center}
.allclear{color:var(--ok);font-size:14px;padding:8px 2px}
/* toast + modal */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(40px);background:#172030;border:1px solid #3a4a6a;color:var(--ink);padding:10px 16px;border-radius:10px;font-size:13px;opacity:0;transition:.25s;z-index:50;box-shadow:0 8px 24px #0008}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#modal{position:fixed;inset:0;background:#000a;display:none;place-items:center;z-index:60;padding:40px;cursor:zoom-out}
#modal.show{display:grid}
#modal .inner{max-width:1100px;max-height:90vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:12px}
#modal img{max-width:100%;display:block}
.proto-tag{position:fixed;bottom:10px;left:12px;font:600 10px 'JetBrains Mono';color:#0b0d10;background:var(--warn);padding:3px 8px;border-radius:6px;z-index:50;opacity:.85}
</style></head>
<body>
<div class="bar">
  <div class="brand" onclick="goHome()"><span class="glyph">j</span>junto</div>
  <div class="switch" id="switch">
    <div class="cur" onclick="toggleSwitch(event)"><span class="ri">▣</span><span class="rn" id="wsName">junto-ledger</span><span class="car">▾</span></div>
    <div class="menu" id="wsMenu"></div>
  </div>
  <div class="spacer"></div>
  <div class="live-strip"><span class="pulse"></span><span id="liveStatus"></span></div>
  <div class="acct"><span class="pa">D</span>Dan Cieslak</div>
</div>

<div class="strip">
  <div class="strip-head"><span class="t">Lineage</span><span class="h">click a track to focus · click the wordmark for the board</span></div>
  <div id="strip"></div>
</div>

<div id="main"></div>

<div id="toast"></div>
<div id="modal" onclick="closeModal()"><div class="inner" id="modalInner" onclick="event.stopPropagation()"></div></div>
<div class="proto-tag">PROTOTYPE · in-memory · reload resets</div>

<script>
// ---------- in-memory data ----------
const DIFF_RENDER = `<div class="dl hd">@@ fn index_html(view: &ChannelView) @@</div>
<div class="dl hd"> </div>
<div class="dl del">-    out.push_str("&lt;h1&gt;channels&lt;/h1&gt;");</div>
<div class="dl del">-    out.push_str(&sidebar(&summaries));</div>
<div class="dl add">+    out.push_str(&top_bar(&identity, &workspace));</div>
<div class="dl add">+    out.push_str(&lineage_strip(&view, selected));</div>
<div class="dl add">+    out.push_str(&detail_pane(&selected));</div>
<div class="dl hd"> </div>
<div class="dl hd">@@ fn detail_pane(inq: &Inquiry) @@</div>
<div class="dl add">+    let artifact = inq.latest_artifact();   // default view</div>
<div class="dl add">+    out.push_str(&artifact_viewer(artifact));</div>
<div class="dl hd">  ...</div>`;
const DIFF_WEB = `<div class="dl hd">@@ fn routes() @@</div>
<div class="dl del">-    .route("/channels/:name", get(channel_html))</div>
<div class="dl add">+    .route("/w/:workspace", get(workspace_html))</div>
<div class="dl add">+    .route("/w/:workspace/:inquiry", get(inquiry_html))</div>
<div class="dl hd">  ...</div>`;

const DATA = {
  workspaces: [
    {id:'junto-ledger', name:'junto-ledger', path:'D:\\\\git\\\\junto-ledger'},
    {id:'wmux', name:'wmux', path:'D:\\\\git\\\\wmux\\\\wmux'},
  ],
  // strip per workspace: a pinned spine at the BOTTOM + branches stacked
  // above it, newest nearest the spine, older higher (walk back in time by
  // expanding). branches listed newest-first.
  strip: {
    'junto-ledger':{
      spine:{id:'junto-dev', name:'junto-dev', color:'#5b9dff', start:120, end:1140, cap:'live'},
      branches:[ // newest first → nearest the spine
        {id:'ui-redesign', name:'ui redesign', color:'#ffb454', diverge:900, cap:'live'},
        {id:'acp', name:'acp permission fix', color:'#b98cff', diverge:430, converge:1000},
        {id:'terminology', name:'terminology rename', color:'#b98cff', diverge:500, converge:880},
        {id:'agent-ui', name:'agent user interface', color:'#7d8696', diverge:640, end:1100, cap:'quiet'},
        {id:'push-gate', name:'push-gate loop', color:'#b98cff', diverge:320, converge:560},
        {id:'ci-matrix', name:'ci matrix', color:'#b98cff', diverge:200, converge:380},
      ],
    },
    'wmux':{
      spine:{id:'wmux', name:'wmux', color:'#5fd3a6', start:300, end:760, cap:'quiet'},
      branches:[
        {id:'dummy', name:'dummy channel', color:'#3a6f5e', diverge:600, end:880, cap:'quiet', independent:true},
      ],
    },
  },
  inquiries: {
    'junto-dev':{ws:'junto-ledger', name:'junto-dev', status:'live', chip:['● live','live'], sub:'the spine · 142 entries',
      standing:[
        ['Base direction is the “living workspace”, scoped per repo.','ratified · 1h'],
        ['Inquiries render as a lineage DAG, not a flat list.','ratified · 30m'],
        ['Lineage is a top strip, always; detail pane below.','ratified · 12m'],
      ], artifacts:[]},
    'ui-redesign':{ws:'junto-ledger', name:'ui redesign', status:'live', chip:['● Claude working','live'],
      sub:'diverged from <b>junto-dev</b> 8h ago · Claude Code',
      agent:'Claude Code', progress:64, prog:'turn 9 · 6 artifacts · +912 / −21',
      gate:{title:'Push <span class="k">fix-sync-test</span> and open a PR', meta:'proposed 2h ago · blocking the session',
        why:'Mockups are reviewed and the branch is clean. A PR lets the team see it before we commit to the new IA.'},
      turns:[
        ['turn 9','Merged the session view into the inquiry; diff moves to the right.','+ diff'],
        ['turn 8','Rendered vertical + horizontal lineage; picked top-strip-always.',''],
        ['turn 7','Built the artifact viewer; steering moved into the session.',''],
      ],
      artifacts:[
        {name:'diff · render.rs', type:'diff', last:true, content:DIFF_RENDER, meta:['render.rs','+18 / −4','generated turn 9 · 2m ago']},
        {name:'diff · web.rs', type:'diff', content:DIFF_WEB, meta:['web.rs','+9 / −2','turn 7']},
        {name:'6 mockups', type:'img', src:'overview.png', meta:['overview.png','PNG · viewed']},
        {name:'session blade', type:'img', src:'session-blade.png', meta:['session-blade.png','PNG']},
      ]},
    'agent-ui':{ws:'junto-ledger', name:'agent user interface', status:'quiet', chip:['open · quiet','quiet'],
      sub:'diverged from <b>junto-dev</b> 2d ago · no agent running',
      standing:[['Agents are configured machine-locally, identity-only in the ledger.','ratified · 2d']],
      startwork:true, artifacts:[]},
    'terminology':{ws:'junto-ledger', name:'terminology rename', status:'converged', chip:['✓ converged → junto-dev','conv'],
      sub:'diverged 3d ago · converged back 8h ago',
      standing:[['Terminology follows Anthropic managed-agents (ADR 0025).','ratified · 8h']],
      artifacts:[{name:'PR #38 (merged)', type:'diff', last:true, content:DIFF_WEB, meta:['12 files','+340 / −300','merged 8h ago']}]},
    'acp':{ws:'junto-ledger', name:'acp permission fix', status:'converged', chip:['✓ converged → junto-dev','conv'],
      sub:'diverged 4d ago · converged back 3h ago',
      standing:[['Govern edits via the permission seam, not junto writing files.','ratified · 3h']],
      artifacts:[{name:'PR #44 (merged)', type:'diff', last:true, content:DIFF_RENDER, meta:['acp.rs','+20 / −2','merged 3h ago']}]},
    'wmux':{ws:'wmux', name:'wmux', status:'quiet', chip:['independent · quiet','quiet'], sub:'independent lineage · quiet 3d',
      standing:[['Window layout persists across restarts.','ratified · 3d']], startwork:true, artifacts:[]},
    'dummy':{ws:'wmux', name:'dummy channel', status:'quiet', chip:['independent · quiet','quiet'], sub:'independent · quiet 22h',
      turns:[['turn 1','pong','']], startwork:true, artifacts:[]},
  },
};

let state = {ws:'junto-ledger', sel:'ui-redesign', artIdx:{}, expanded:false};
const WINDOW = 3;     // branches shown before the expander kicks in
const ROW = 30;       // vertical spacing between tracks
const PAD_TOP = 26;   // headroom above the top track (now line + expander)

// ---------- strip: spine pinned at BOTTOM, branches stack upward ----------
function buildStrip(){
  const w = DATA.strip[state.ws];
  const all = w.branches;
  const hidden = Math.max(0, all.length - WINDOW);
  const shown = state.expanded ? all : all.slice(0, WINDOW);   // newest-first
  const n = shown.length;
  const spineY = PAD_TOP + n*ROW;            // bottom-most track
  const H = spineY + 54;                      // room for spine label + axis below
  // newest branch (index 0) sits just above the spine; older → higher
  const yOf = i => spineY - (i+1)*ROW;

  let s = `<svg viewBox="0 0 1200 ${H}" role="img"><defs><filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`;

  // selected highlight band
  let selY = state.sel===w.spine.id ? spineY : null;
  shown.forEach((b,i)=>{ if(b.id===state.sel) selY = yOf(i); });
  if(selY!=null) s += `<rect x="0" y="${selY-13}" width="1200" height="26" fill="#ffb4540d"/>`;

  // now line spans the whole stack
  s += `<line x1="1140" y1="12" x2="1140" y2="${spineY+8}" stroke="#5b9dff55" stroke-width="1.5" stroke-dasharray="3 5"/><text x="1140" y="9" text-anchor="middle" class="nowlab">now</text>`;

  // expander row at the very top (older history lives upward)
  if(hidden>0){
    const label = state.expanded ? `⌄ collapse — show ${WINDOW} most recent` : `⌃ ${hidden} older side-quest${hidden===1?'':'s'} — walk back`;
    s += `<text x="200" y="16" text-anchor="end" style="font:600 11px Inter;fill:#7d8696;cursor:pointer" onclick="toggleExpand()">${label}</text>`;
    s += `<rect x="100" y="4" width="1040" height="16" fill="transparent" style="cursor:pointer" onclick="toggleExpand()"/>`;
  }

  // branches (upward curves from the bottom spine)
  shown.forEach((b,i)=>{
    const ty = yOf(i), sel = b.id===state.sel?' sel':'';
    s += `<text x="200" y="${ty+4}" text-anchor="end" class="lname${sel}" onclick="select('${b.id}')">${b.name}</text>`;
    if(b.independent){
      s += `<line x1="${b.diverge}" y1="${ty}" x2="${b.end}" y2="${ty}" stroke="${b.color}" stroke-width="2"/>`;
      s += `<circle cx="${b.diverge}" cy="${ty}" r="4" fill="${b.color}"/>` + cap(b.end,ty,b.color,b.cap);
    } else {
      const dx=b.diverge;
      s += `<path d="M${dx},${spineY} C${dx+20},${spineY} ${dx+12},${ty} ${dx+32},${ty}" stroke="${b.color}" stroke-width="2" fill="none"/>`;
      s += `<circle cx="${dx}" cy="${spineY}" r="3" fill="${b.color}"/>`;
      if(b.converge){
        const cx=b.converge;
        s += `<line x1="${dx+32}" y1="${ty}" x2="${cx-30}" y2="${ty}" stroke="${b.color}" stroke-width="2"/>`;
        s += `<path d="M${cx-30},${ty} C${cx-5},${ty} ${cx-12},${spineY} ${cx},${spineY}" stroke="${b.color}" stroke-width="2" fill="none"/>`;
        s += `<circle cx="${cx}" cy="${spineY}" r="4.5" fill="#0b0d10" stroke="#5fd3a6" stroke-width="2"/>`;
      } else {
        s += `<line x1="${dx+32}" y1="${ty}" x2="${b.end||1140}" y2="${ty}" stroke="${b.color}" stroke-width="${b.color==='#ffb454'?3:2}"/>`;
        s += cap(b.end||1140, ty, b.color, b.cap);
      }
    }
    s += `<rect class="track-hit" x="210" y="${ty-12}" width="930" height="24" fill="transparent" onclick="select('${b.id}')"/>`;
  });

  // the pinned main-line at the bottom
  const sp=w.spine, spSel = sp.id===state.sel?' sel':'';
  s += `<line x1="${sp.start}" y1="${spineY}" x2="${sp.end}" y2="${spineY}" stroke="${sp.color}" stroke-width="3"/>`;
  s += `<circle cx="${sp.start}" cy="${spineY}" r="5" fill="${sp.color}"/>` + cap(sp.end,spineY,sp.color,sp.cap);
  s += `<rect class="track-hit" x="${sp.start}" y="${spineY-11}" width="${sp.end-sp.start}" height="22" fill="transparent" onclick="select('${sp.id}')"/>`;
  // spine label BELOW the line so it never sits on top of it
  s += `<text x="${sp.start}" y="${spineY+22}" text-anchor="start" class="lname${spSel}" style="font-weight:700" onclick="select('${sp.id}')">${sp.name} <tspan style="font-weight:500;fill:#525b69;font-size:10px">· main line</tspan></text>`;

  // time axis just below the spine label
  s += `<g class="axis"><text x="430" y="${spineY+42}" text-anchor="middle">5d</text><text x="600" y="${spineY+42}" text-anchor="middle">3d</text><text x="760" y="${spineY+42}" text-anchor="middle">1d</text><text x="920" y="${spineY+42}" text-anchor="middle">8h</text><text x="1010" y="${spineY+42}" text-anchor="middle">3h</text></g></svg>`;
  document.getElementById('strip').innerHTML = s;
}
function toggleExpand(){ state.expanded=!state.expanded; buildStrip(); }
function cap(x,y,color,kind){
  if(kind==='live') return `<circle cx="${x}" cy="${y}" r="5.5" fill="${color}" class="capglow" filter="url(#glow)"/>`;
  return `<circle cx="${x}" cy="${y}" r="4.5" fill="#0b0d10" stroke="${color}" stroke-width="2"/>`;
}

// ---------- detail ----------
function artIndex(id){ return state.artIdx[id] ?? Math.max(0, (DATA.inquiries[id].artifacts||[]).findIndex(a=>a.last)); }

function renderDetail(){
  const id = state.sel, q = DATA.inquiries[id];
  if(!q){ goHome(); return; }
  const chipClass = q.chip[1];
  const hasArt = (q.artifacts||[]).length>0;
  let left = '';
  // gate
  if(q.gate){
    left += `<div class="card"><div class="ch"><span class="h">Needs you</span><span class="badge">gate</span></div>
      <div class="gate-row"><div class="av">C</div><div class="gb">
        <div class="gt">${q.gate.title}</div><div class="gm">${q.gate.meta}</div>
        <div class="why">${q.gate.why}</div>
        <div class="mini"><button class="mb" onclick="resolveGate('${id}','rejected')">Reject</button><button class="mb warn" onclick="resolveGate('${id}','approved')">Approve push</button></div>
      </div></div></div>`;
  }
  // turns + steer (live) OR start-work (idle)
  if(q.turns){
    left += `<div class="card"><div class="ch"><span class="h">Turns</span></div>` +
      q.turns.map(t=>`<div class="turn"><span class="who">${t[0]}</span><span class="tt">${t[1]}${t[2]?`<span class="new">${t[2]}</span>`:''}</span></div>`).join('') + `</div>`;
  }
  if(q.status==='live'){
    left += `<div class="steer"><div class="lbl">◗ Steer this session</div>
      <textarea id="steerBox" rows="2" placeholder="tell Claude what to do next…"></textarea>
      <div class="send"><button class="mb go" onclick="steer('${id}')">Send to Claude</button></div></div>`;
  } else if(q.startwork){
    left += `<div class="card"><div class="ch"><span class="h">Start work</span></div><div class="start">
      <input id="startBox" placeholder="what should the agent do? e.g. fix the flaky sync test">
      <button class="mb go" onclick="startWork('${id}')">Launch Claude here</button></div></div>`;
  }
  // standing decisions
  if(q.standing){
    left += `<div class="card"><div class="ch"><span class="h">Standing decisions</span></div>` +
      q.standing.map(d=>`<div class="dec">${d[0]}<span class="when">${d[1]}</span></div>`).join('') + `</div>`;
  }

  // right: artifact viewer
  let right = '';
  if(hasArt){
    const idx = artIndex(id), art = q.artifacts[idx];
    const tabs = q.artifacts.map((a,i)=>`<div class="tab ${i===idx?'on':''}" onclick="pickArt('${id}',${i})"><span class="ic">◈</span> ${a.name}${a.last?' <span class="last">last turn</span>':''}</div>`).join('');
    let body = art.type==='diff' ? `<div class="diff">${art.content}</div>`
      : `<div class="imgwrap" onclick="popOut('${id}',${idx})"><img src="${art.src}" alt="${art.name}"></div>`;
    right = `<div class="viewer"><div class="vhead"><span class="h">Artifact</span><span class="pop" onclick="popOut('${id}',${idx})">⤢ pop out</span></div>
      <div class="tabs">${tabs}</div>${body}
      <div class="vmeta">${art.meta.map(m=>`<span>${m}</span>`).join('')}</div></div>`;
  }

  const main = document.getElementById('main');
  const recBtn = `<span class="gbtn rec" onclick="record('${id}')">＋ Record a finding</span>`;
  const convBtn = q.status==='live' ? `<span class="gbtn" onclick="toast('Convergence ceremony — resolve open gates, then close into junto-dev')">converge → junto-dev</span>` : '';
  const header = `<div class="bh"><h1>${q.name}</h1><span class="chip ${chipClass}">${q.chip[0]}</span>${q.gate?'<span class="chip gate">1 gate</span>':''}
      <div class="acts">${recBtn}${convBtn}</div></div><div class="bsub">${q.sub}</div>`;
  const prog = q.progress!=null ? `<div class="prog"><div class="sbar"><i style="width:${q.progress}%"></i></div><span class="pcap">${q.prog}</span></div>`:'';
  const cols = hasArt ? `<div class="grid"><div>${left}</div><div>${right}</div></div>`
    : `<div class="col-solo">${left||'<p class="empty">nothing recorded yet — start work to begin</p>'}</div>`;
  main.innerHTML = `<div class="blade">${header}${prog}${cols}</div>`;
}

// ---------- home / focus board ----------
function renderHome(){
  state.sel=null; buildStrip();
  const items = Object.entries(DATA.inquiries).filter(([id,q])=>q.ws===state.ws && (q.gate || q.status==='live'));
  let board='';
  if(items.length===0){ board=`<p class="allclear">all clear — nothing awaits your verification in ${DATA.workspaces.find(w=>w.id===state.ws).name}</p>`; }
  else board = items.map(([id,q])=>{
    const tick = q.gate?'var(--warn)':'var(--accent)';
    const meta = q.gate?`gate · blocking · ${q.name}`:`live session · ${q.name}`;
    const acts = q.gate?`<button class="mb" onclick="event.stopPropagation();resolveGate('${id}','rejected')">Reject</button><button class="mb warn" onclick="event.stopPropagation();resolveGate('${id}','approved')">Approve</button>`
      :`<button class="mb go" onclick="event.stopPropagation();select('${id}')">Open</button>`;
    const title = q.gate? q.gate.title : `${q.name} — ${q.prog||'working'}`;
    return `<div class="fitem" onclick="select('${id}')"><span class="ftick" style="background:${tick}"></span>
      <div class="fbody"><div class="ftitle">${title}</div><div class="fmeta">${meta}</div></div><div class="fact">${acts}</div></div>`;
  }).join('');
  document.getElementById('main').innerHTML = `<div class="blade"><div class="board-h">needs you</div>
    <div class="board-sub">${DATA.workspaces.find(w=>w.id===state.ws).name} · ${items.length} item${items.length===1?'':'s'} awaiting your act</div>${board}</div>`;
}

// ---------- actions ----------
function select(id){ state.sel=id; buildStrip(); renderDetail(); window.scrollTo({top:0,behavior:'smooth'}); }
function goHome(){ renderHome(); updateLive(); }
function pickArt(id,i){ state.artIdx[id]=i; renderDetail(); }
function popOut(id,i){
  const a=DATA.inquiries[id].artifacts[i];
  const inner = a.type==='img'?`<img src="${a.src}">`:`<div class="diff" style="max-height:none">${a.content}</div>`;
  document.getElementById('modalInner').innerHTML=inner; document.getElementById('modal').classList.add('show');
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
function resolveGate(id,verdict){
  const q=DATA.inquiries[id]; q.gate=null;
  q.turns = q.turns||[]; q.turns.unshift(['you', `Dan ${verdict} the push.`, verdict==='approved'?'✓':'✗']);
  if(verdict==='approved'){ q.prog='turn 10 · pushing branch…'; q.progress=78; }
  toast(`Gate ${verdict} — recorded to the ledger`); updateLive();
  if(state.sel===id) renderDetail(); else renderHome();
}
function steer(id){
  const box=document.getElementById('steerBox'); const v=(box.value||'').trim(); if(!v){toast('type a steer first');return;}
  const q=DATA.inquiries[id]; q.turns.unshift(['turn '+(10+ (q._n=(q._n||0)+1)), 'You: '+v, '↻']);
  box.value=''; toast('Sent to Claude'); renderDetail();
}
function startWork(id){
  const box=document.getElementById('startBox'); const v=(box.value||'').trim(); if(!v){toast('describe the work first');return;}
  const q=DATA.inquiries[id]; q.status='live'; q.chip=['● Claude working','live']; q.agent='Claude Code';
  q.progress=8; q.prog='turn 1 · starting…'; q.startwork=false;
  q.turns=[['turn 1','You: '+v, '↻']];
  q.artifacts=[{name:'(awaiting first artifact)', type:'diff', last:true, content:'<div class="dl hd">  no artifact yet — the agent is working…</div>', meta:['—']}];
  toast('Launched Claude in this inquiry'); buildStrip(); renderDetail(); updateLive();
}
function record(id){ toast('Record a finding → opens a compose flow with a 2–4 option decision frame (ADR 0019)'); }

function updateLive(){
  let working=0, gates=0;
  for(const q of Object.values(DATA.inquiries)){ if(q.ws===state.ws){ if(q.status==='live')working++; if(q.gate)gates++; } }
  document.getElementById('liveStatus').textContent = `${working} agent${working===1?'':'s'} working · ${gates} gate${gates===1?'':'s'} need${gates===1?'s':''} you`;
}

// workspace switcher
function buildSwitch(){
  document.getElementById('wsMenu').innerHTML = DATA.workspaces.map(w=>`<a onclick="setWs('${w.id}')"><span class="ri" style="background:#1b2330">▣</span><span><div style="font-weight:600;color:var(--ink)">${w.name}</div><div style="font-family:'JetBrains Mono';font-size:11px;color:var(--faint)">${w.path}</div></span></a>`).join('');
}
function toggleSwitch(e){ e.stopPropagation(); document.getElementById('switch').classList.toggle('open'); }
function setWs(id){
  state.ws=id; document.getElementById('wsName').textContent=DATA.workspaces.find(w=>w.id===id).name;
  document.getElementById('switch').classList.remove('open');
  // select that workspace's first needs-you or first track
  const inq=Object.entries(DATA.inquiries).filter(([k,q])=>q.ws===id);
  const needy=inq.find(([k,q])=>q.gate||q.status==='live');
  state.sel = needy?needy[0]:inq[0][0]; state.artIdx={};
  buildStrip(); renderDetail(); updateLive();
}
document.addEventListener('click',()=>document.getElementById('switch').classList.remove('open'));
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){closeModal();} });

// init
buildSwitch(); buildStrip(); renderDetail(); updateLive();
</script>
</body></html>
